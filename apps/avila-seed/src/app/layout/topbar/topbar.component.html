<div class="container">
  <div class="row row-container">
    <div class="col-xs">
      <div class="box left-container">
        <img src="./images/avila-seed.png" alt="Logo Avila" class="logo" />
        <div class="title">Avila Seed</div>
      </div>
    </div>
    <div class="col-xs">
      <div class="right-container">
        <div class="search-box">
          <input type="search" name="" id="search">
          <label for="search">Search</label>
          <i class='bx bx-search-alt-2 icon-search'></i>
        </div>
        <div class="top-menu">
          <div class="top-menu-item">
            <button class="top-menu-item-btn" [cdkMenuTriggerFor]="languageOverlay" >
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" style="fill: rgba(0, 0, 0, 1);">
                <path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm7.931 9h-2.764a14.67 14.67 0 0 0-1.792-6.243A8.013 8.013 0 0 1 19.931 11zM12.53 4.027c1.035 1.364 2.427 3.78 2.627 6.973H9.03c.139-2.596.994-5.028 2.451-6.974.172-.01.344-.026.519-.026.179 0 .354.016.53.027zm-3.842.7C7.704 6.618 7.136 8.762 7.03 11H4.069a8.013 8.013 0 0 1 4.619-6.273zM4.069 13h2.974c.136 2.379.665 4.478 1.556 6.23A8.01 8.01 0 0 1 4.069 13zm7.381 6.973C10.049 18.275 9.222 15.896 9.041 13h6.113c-.208 2.773-1.117 5.196-2.603 6.972-.182.012-.364.028-.551.028-.186 0-.367-.016-.55-.027zm4.011-.772c.955-1.794 1.538-3.901 1.691-6.201h2.778a8.005 8.005 0 0 1-4.469 6.201z">
                </path>
              </svg>
              <span>{{ selectedLanguage!.label }}</span> 
              <i class="bx bx-chevron-down"></i> 
            </button>
          </div>
          <button class="logout-box" [cdkMenuTriggerFor]="userOverlay" >
            <i class='bx bx-user'></i>
          </button>
          <button class="cart-box" (click)="viewCart()">
            <i class='bx bx-cart-alt'></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #languageOverlay>
  <div class="overlay overlay-language overlay-fall" cdkMenu>
    <ul>
      @for (lang of languages; track lang){
        <li cdkMenuItem>
          <a (click)="selectLanguage(lang.key)">
            <span>{{ lang.label }}</span>
          </a>
        </li>
      }
    </ul>
  </div>
</ng-template>

<ng-template #userOverlay>
  <div class="overlay overlay-user overlay-fall" cdkMenu>
    <ul>
      <li cdkMenuItem><a (click)="login()">Mon compte</a></li>
      @if(this.auth.isLoggedIn){
        <li cdkMenuItem><a (click)="logout()">logout</a></li>
      }
</ul>
  </div>
</ng-template>
